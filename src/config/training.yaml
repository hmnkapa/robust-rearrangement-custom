training:
  gpu_id: 0
  
  actor_lr: 1e-4
  encoder_lr: ${training.actor_lr}
  clip_grad_norm: false
  clip_sample: true
  mixed_precision: false
  
  num_epochs: 10000
  batch_size: 256
  start_epoch: 0
  steps_per_epoch: 1000 # Set to -1 to do one pass over the dataset

  load_checkpoint_run_id: null
  
  eval_every: 100
  sample_every: 100
  
  model_save_dir: models
  save_checkpoints:
    - last
    - best_test_loss
    - best_success_rate
  save_last_every: 10
  async_checkpoint_saver: true
  checkpoint_saver_tmp_dir: null
  checkpoint_saver_retry_seconds: 30

  # Deprecated in bc_ddp.py; kept for compatibility with older entrypoints/configs.
  checkpoint_interval: -1
  save_per_epoch: 1000

  store_best_test_loss_model: true
  store_last_model: true
  store_best_success_rate_model: true

  ema:
    use: false
    decay: 0.999
    switch: false
